services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REN_STORAGE_PATH=/data/ren-finance
      - REN_HTTP_PORT=3000
      - REN_LOG_LEVEL=${REN_LOG_LEVEL:-info}
      - REN_CORS_ORIGINS=${REN_CORS_ORIGINS:-http://localhost:*}
    volumes:
      - ren-finance-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ren-finance-data:
